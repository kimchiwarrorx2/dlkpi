<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>콘텐츠플래닝팀 KPI</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

        :root {
            --primary: #6366F1;
            --lv1-1: #6366F1;
            --lv1-2: #0EA5E9;
            --lv1-3: #10B981;
            --lv1-4: #F59E0B;
            --lv1-5: #8B5CF6;
            --lv1-6: #EF4444;
            --lv1-7: #64748B;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #F8FAFC;
            color: #1E293B;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lv1-container {
            border-left: 6px solid var(--primary);
            margin-bottom: 3rem;
        }

        .lv2-group {
            background: linear-gradient(to right, #fff, #f8fafc);
            border: 1px solid #e2e8f0;
        }

        /* Lv3 Item Specific Layout */
        .lv3-item {
            position: relative;
            background: white;
            border: 1px solid #E2E8F0;
            transition: all 0.2s ease;
            overflow: hidden;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1.5rem;
            z-index: 10;
        }

        .lv3-label-text {
            font-weight: 800;
            font-size: 1rem;
            color: #0F172A;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .lv3-full-text {
            font-size: 0.8125rem;
            color: #64748B;
            line-height: 1.4;
            font-weight: 500;
        }

        .lv3-code-overlay {
            position: absolute;
            inset: 0;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            font-weight: 900;
            font-size: 2.5rem;
            transform: translateY(10%);
            z-index: 20;
        }

        .lv3-item:hover .lv3-code-overlay {
            opacity: 0.98;
            transform: translateY(0);
        }

        .add-project-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            width: 28px;
            height: 28px;
            background: #0F172A;
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .project-chip {
            background-color: #0F172A;
            color: #F8FAFC;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #1E293B;
        }

        .delete-chip-btn {
            width: 14px;
            height: 14px;
            background: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 8px;
        }

        .delete-chip-btn:hover {
            background: #EF4444;
        }

        .tab-btn {
            padding: 0.75rem 1.75rem;
            font-weight: 800;
            color: #64748B;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            right: 15%;
            height: 3px;
            background: var(--primary);
            border-radius: 3px;
        }

        .btn-fancy {
            background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            color: #fff;
        }

        .login-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0F172A;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Drag and Drop Ghost */
        .sortable-ghost {
            opacity: 0.3;
            background: #E2E8F0 !important;
            border: 2px dashed #6366F1 !important;
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_DATA = {
            "tree": [
                {
                    "code": "1", "label": "수주 목표 달성", "full": "E&C 수주 목표 달성 기여",
                    "children": [
                        {
                            "code": "1", "label": "MPR 실행 지원", "full": "아크로 수주 MPR 전방위 실행 지원",
                            "children": [
                                { "code": "1", "label": "브랜드 영상 기획·개발", "full": "브랜드 영상 기획 및 개발", "projects": ["아크로 하이엔드 무드 영상", "e편한세상 수주 영상"] },
                                { "code": "2", "label": "브랜드 MPR 지원", "full": "브랜드 MPR 지원", "projects": ["브로슈어 개선"] },
                                { "code": "3", "label": "라운지 공간 디자인 개발", "full": "아크로 라운지 공간 구현 및 디자인 개발", "projects": ["압구정 라운지", "성수동 라운지", "목동 홍보관"] },
                                { "code": "4", "label": "핵심 수주 사업지 디자인 기획·개발", "full": "압구정, 목동, 성수 및 핵심 수주 사업지 대상 디자인 기획/개발", "projects": [] }
                            ]
                        }
                    ]
                },
                {
                    "code": "2", "label": "영업이익 달성", "full": "E&C 영업이익 달성 기여",
                    "children": [{ "code": "1", "label": "관계사 브랜드 수수료", "full": "관계사 브랜드 수수료", "children": [{ "code": "1", "label": "관계사 브랜드 사용 지원", "full": "관계사 e편한세상 브랜드 사용 지원", "projects": [] }] }]
                },
                {
                    "code": "3", "label": "브랜드 경쟁력 강화", "full": "ACRO, e편한세상 브랜드 경쟁력 강화",
                    "children": [
                        { "code": "1", "label": "입주·거주 고객 CRM 강화", "children": [{ "code": "1", "label": "서비스 프로그램 기획", "full": "기획", "projects": [] }, { "code": "2", "label": "서비스 디자인 기획·개발", "full": "개발", "projects": [] }] },
                        { "code": "2", "label": "유튜브 콘텐츠 강화", "children": [{ "code": "1", "label": "기획·제작", "full": "기획/제작", "projects": [] }] },
                        { "code": "3", "label": "브랜디드 경험 디자인 개발", "children": [{ "code": "1", "label": "분양 키비주얼", "full": "키비주얼", "projects": [] }] },
                        { "code": "4", "label": "브랜드리더쉽 지표 1위 달성", "children": [{ "code": "1", "label": "브랜드 지표 1위", "full": "1위", "projects": [] }] },
                        { "code": "5", "label": "브랜드·전사 콘텐츠 고도화", "children": [{ "code": "1", "label": "메터리얼 업그레이드", "full": "업그레이드", "projects": [] }] },
                        { "code": "6", "label": "브랜드 Risk Zero", "children": [{ "code": "1", "label": "운영/관리 강화", "full": "강화", "projects": [] }] }
                    ]
                },
                { "code": "4", "label": "매뉴얼작성", "children": [{ "code": "1", "label": "매뉴얼 개정", "children": [{ "code": "1", "label": "Application 매뉴얼", "full": "매뉴얼", "projects": [] }] }] },
                { "code": "5", "label": "그룹사 동기화", "children": [{ "code": "1", "label": "프로세스 미러링", "children": [{ "code": "1", "label": "수주·홍보 동기화", "full": "동기화", "projects": [] }] }] },
                { "code": "6", "label": "마켓 인텔리전스", "children": [{ "code": "1", "label": "마켓 인사이트", "children": [{ "code": "1", "label": "360° 강화", "full": "강화", "projects": [] }] }] },
                {
                    "code": "7", "label": "기타 고유 업무", "children": [
                        { "code": "1", "label": "DIC 인사", "children": [{ "code": "1", "label": "업무 지원", "full": "지원", "projects": [] }] },
                        { "code": "2", "label": "예산 관리", "children": [{ "code": "1", "label": "판관비 관리", "full": "관리", "projects": [] }] }
                    ]
                }
            ],
            "workUnits": [
                { "code": "1", "label": "회의", "definition": "내외부 회의, 킥오프, 정기 점검" },
                { "code": "2", "label": "기획", "definition": "데스크 리서치, 현장 조사, 방향성·전략, 컨셉·콘텐츠 기획" },
                { "code": "3", "label": "디자인", "definition": "UI/그래픽/템플릿/모션/사운드 등 디자인 개발" },
                { "code": "4", "label": "제작·감리", "definition": "샘플·인쇄·제작·현장 감리·머터리얼" },
                { "code": "5", "label": "보고", "definition": "팀장/임원 보고, 품의, 결재" },
                { "code": "6", "label": "운영", "definition": "운영 지원, 채널 운영, 성과 분석" },
                { "code": "7", "label": "매뉴얼", "definition": "매뉴얼 수립·개정, 유관부서 대응" },
                { "code": "8", "label": "QC", "definition": "디자인 템플릿 QC/표준 준수 점검" }
            ],
            "sites": []
        };

        const STORAGE_KEY = 'cp_team_kpi_v9_full_features';
        const PASSWORD_HASH = "1234";

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(() => sessionStorage.getItem('isLoggedIn') === 'true');
            const [password, setPassword] = useState('');
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : INITIAL_DATA;
            });
            const [activeTab, setActiveTab] = useState('kpi');

            useEffect(() => {
                if (isLoggedIn) localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }, [data, isLoggedIn]);

            const handleExport = () => {
                const wb = XLSX.utils.book_new();
                // KPI_명칭 시트
                const kpiShort = [];
                data.tree.forEach(l1 => {
                    l1.children.forEach(l2 => {
                        l2.children.forEach(l3 => {
                            kpiShort.push({ 'Lv1': l1.label, 'Lv2': l2.label, 'Lv3': l3.label, '코드넘버': `${l1.code}${l2.code}${l3.code}`, '하위 프로젝트': (l3.projects || []).join(', ') });
                        });
                    });
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(kpiShort), 'KPI_명칭');
                // KPI_전체명칭 시트
                const kpiFull = [];
                data.tree.forEach(l1 => {
                    l1.children.forEach(l2 => {
                        l2.children.forEach(l3 => {
                            kpiFull.push({ 'Lv1 전체명': l1.full || l1.label, 'Lv2 전체명': l2.full || l2.label, 'Lv3 전체명': l3.full || l3.label, '코드넘버': `${l1.code}${l2.code}${l3.code}` });
                        });
                    });
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(kpiFull), 'KPI_전체명칭');
                // 업무단위 시트
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.workUnits.map(u => ({ 코드: u.code, 명칭: u.label, 정의: u.definition }))), '업무단위');
                // SITES 시트
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.sites.map(s => ({ 코드: `S${s.code}`, 현장명: s.name }))), 'SITES');
                XLSX.writeFile(wb, `CpTeam_KPI_${new Date().toISOString().split('T')[0]}.xlsx`);
                alert('엑셀 저장 완료!');
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const newData = { ...data };
                    // 업무단위 시트 읽기
                    if (wb.SheetNames.includes('업무단위')) {
                        const rows = XLSX.utils.sheet_to_json(wb.Sheets['업무단위']);
                        newData.workUnits = rows.map((r, i) => ({ code: String(i + 1), label: r['명칭'] || r['label'] || '', definition: r['정의'] || r['definition'] || '' }));
                    }
                    setData(newData);
                    alert('임포트 완료!');
                };
                reader.readAsBinaryString(file);
                e.target.value = '';
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === PASSWORD_HASH) { setIsLoggedIn(true); sessionStorage.setItem('isLoggedIn', 'true'); }
                else alert('비밀번호가 틀렸습니다.');
            };

            if (!isLoggedIn) {
                return (
                    <div className="login-screen">
                        <form onSubmit={handleLogin} className="glass-card p-12 rounded-[40px] w-full max-w-md flex flex-col items-center gap-8">
                            <div className="w-20 h-20 bg-slate-900 rounded-3xl flex items-center justify-center shadow-2xl"><i data-lucide="lock" className="text-white w-10 h-10"></i></div>
                            <h2 className="text-2xl font-black text-slate-900 uppercase">ACCESS REQUIRED</h2>
                            <input type="password" placeholder="PASSWORD" className="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl text-center font-black tracking-widest focus:border-slate-900 outline-none" value={password} onChange={e => setPassword(e.target.value)} />
                            <button type="submit" className="w-full btn-fancy p-5 rounded-2xl font-black text-lg">UNLOCK SYSTEM</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-24">
                    <header className="bg-white/90 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
                            <div className="flex items-center gap-5">
                                <div className="bg-slate-900 p-2.5 rounded-2xl"><i data-lucide="layout-grid" className="text-white w-6 h-6"></i></div>
                                <h1 className="text-2xl font-black text-slate-900 uppercase">콘텐츠플래닝팀 KPI</h1>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={handleExport} className="flex items-center gap-2 bg-slate-900 text-white px-5 py-2.5 rounded-xl font-black text-xs hover:bg-black transition-all"><i data-lucide="file-down" className="w-4 h-4"></i>EXCEL 저장</button>
                                <label className="flex items-center gap-2 bg-white border-2 border-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-black text-xs hover:border-slate-900 cursor-pointer transition-all">
                                    <i data-lucide="file-up" className="w-4 h-4"></i>EXCEL 가져오기
                                    <input type="file" accept=".xlsx,.xls" className="hidden" onChange={handleImport} />
                                </label>
                                <button onClick={() => { sessionStorage.removeItem('isLoggedIn'); setIsLoggedIn(false); }} className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">LOGOUT</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 mt-12">
                        <div className="flex bg-white/50 backdrop-blur-sm rounded-[20px] p-2 shadow-inner border border-slate-100 mb-12 w-fit">
                            {['kpi', 'workUnits', 'sites'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`tab-btn ${activeTab === tab ? 'active' : ''}`}>
                                    {tab === 'kpi' ? 'KPI TREE' : tab === 'workUnits' ? '업무 단위' : 'SITE MASTER'}
                                </button>
                            ))}
                        </div>
                        <div className="animate-in fade-in slide-in-from-bottom-2 duration-500">
                            {activeTab === 'kpi' && <KpiManager tree={data.tree} onUpdate={tree => setData({ ...data, tree })} />}
                            {activeTab === 'workUnits' && <WorkUnitManager units={data.workUnits} onUpdate={units => setData({ ...data, workUnits: units })} />}
                            {activeTab === 'sites' && <SiteManager sites={data.sites} onUpdate={sites => setData({ ...data, sites })} />}
                        </div>
                    </main>
                </div>
            );
        }

        function KpiManager({ tree, onUpdate }) {
            const handleAddProject = (i1, i2, i3) => {
                const name = prompt('세부 프로젝트 명칭 입력:');
                if (!name) return;
                const newTree = JSON.parse(JSON.stringify(tree));
                if (!newTree[i1].children[i2].children[i3].projects) newTree[i1].children[i2].children[i3].projects = [];
                newTree[i1].children[i2].children[i3].projects.push(name);
                onUpdate(newTree);
            };
            const handleDeleteProject = (i1, i2, i3, pIdx) => {
                if (!confirm('삭제하시겠습니까?')) return;
                const newTree = JSON.parse(JSON.stringify(tree));
                newTree[i1].children[i2].children[i3].projects.splice(pIdx, 1);
                onUpdate(newTree);
            };
            return (
                <div className="space-y-16 pb-32">
                    {tree.map((l1, i1) => (
                        <div key={l1.code} className="lv1-container" style={{ '--primary': `var(--lv1-${l1.code})` }}>
                            <div className="flex items-center gap-4 mb-8 pl-6">
                                <span className="bg-slate-900 text-white px-4 py-1 rounded-lg font-black text-xs uppercase">KPI {l1.code}</span>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tight">{l1.label}</h2>
                            </div>
                            <div className="space-y-10 pl-6">
                                {l1.children.map((l2, i2) => (
                                    <div key={l2.code} className="lv2-group rounded-[32px] p-10">
                                        <div className="flex items-center gap-5 mb-8">
                                            <div className="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl">{l2.code}</div>
                                            <h3 className="text-xl font-black text-slate-800">{l2.label}</h3>
                                        </div>
                                        <div className="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-4 gap-8">
                                            {l2.children.map((l3, i3) => (
                                                <div key={l3.code} className="flex flex-col gap-4">
                                                    <div className="lv3-item rounded-[24px] shadow-sm group">
                                                        <button onClick={() => handleAddProject(i1, i2, i3)} className="add-project-btn"><i data-lucide="plus" className="w-4 h-4"></i></button>
                                                        <div className="lv3-label-text">{l3.label}</div>
                                                        <div className="lv3-full-text">{l3.full}</div>
                                                        <div className="lv3-code-overlay" style={{ background: `var(--lv1-${l1.code})` }}>{l1.code}{l2.code}{l3.code}</div>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2 px-1">
                                                        {(l3.projects || []).map((p, pIdx) => (
                                                            <div key={pIdx} className="project-chip">
                                                                <span>{p}</span>
                                                                <button onClick={() => handleDeleteProject(i1, i2, i3, pIdx)} className="delete-chip-btn"><i data-lucide="x" className="w-2 h-2"></i></button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function WorkUnitManager({ units, onUpdate }) {
            const [draggedIdx, setDraggedIdx] = useState(null);
            const [newItem, setNewItem] = useState({ label: '', definition: '' });

            const handleAdd = () => {
                if (!newItem.label) return;
                onUpdate([...units, { ...newItem, code: String(units.length + 1) }]);
                setNewItem({ label: '', definition: '' });
                setTimeout(() => lucide.createIcons(), 100);
            };

            const onDragStart = (e, index) => { setDraggedIdx(index); e.dataTransfer.effectAllowed = "move"; e.target.classList.add("sortable-ghost"); };
            const onDragOver = (e, index) => {
                e.preventDefault();
                if (draggedIdx === null || draggedIdx === index) return;
                const newUnits = [...units];
                const item = newUnits.splice(draggedIdx, 1)[0];
                newUnits.splice(index, 0, item);
                setDraggedIdx(index);
                onUpdate(newUnits.map((u, i) => ({ ...u, code: String(i + 1) })));
            };

            return (
                <div className="space-y-12">
                    <div className="glass-card rounded-[32px] p-8 border-2 border-slate-100 flex gap-4">
                        <input className="bg-slate-50 p-4 rounded-xl font-bold flex-1 outline-none" placeholder="업무 명칭" value={newItem.label} onChange={e => setNewItem({ ...newItem, label: e.target.value })} />
                        <input className="bg-slate-50 p-4 rounded-xl font-bold flex-1 outline-none" placeholder="업무 정의" value={newItem.definition} onChange={e => setNewItem({ ...newItem, definition: e.target.value })} />
                        <button onClick={handleAdd} className="btn-fancy px-8 rounded-xl font-black">ADD UNIT</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                        {units.map((u, i) => (
                            <div
                                key={i} draggable onDragStart={e => onDragStart(e, i)} onDragOver={e => onDragOver(e, i)} onDragEnd={e => { e.target.classList.remove("sortable-ghost"); setDraggedIdx(null); }}
                                className="glass-card group hover:border-slate-900 rounded-[32px] p-8 flex flex-col items-center text-center bg-white cursor-move relative"
                            >
                                <button onClick={() => onUpdate(units.filter((_, idx) => idx !== i).map((item, id) => ({ ...item, code: String(id + 1) })))} className="absolute top-4 right-4 text-rose-300 hover:text-rose-600 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                <div className="w-16 h-16 rounded-[24px] bg-slate-900 text-white flex items-center justify-center shadow-xl mb-6 font-black text-2xl">{u.code}</div>
                                <input className="w-full text-center text-2xl font-black text-slate-900 mb-2 bg-transparent outline-none" value={u.label} onChange={e => { const n = [...units]; n[i].label = e.target.value; onUpdate(n); }} />
                                <textarea className="w-full text-center text-xs text-slate-500 font-bold bg-transparent outline-none resize-none h-12" value={u.definition} onChange={e => { const n = [...units]; n[i].definition = e.target.value; onUpdate(n); }} />
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function SiteManager({ sites, onUpdate }) {
            const [newSite, setNewSite] = useState({ code: '', name: '' });
            return (
                <div className="space-y-8">
                    <div className="glass-card rounded-[32px] p-8 border-2 border-slate-100 flex gap-4">
                        <input placeholder="CODE" className="bg-slate-50 p-4 rounded-xl font-bold flex-1 outline-none" value={newSite.code} onChange={e => setNewSite({ ...newSite, code: e.target.value })} />
                        <input placeholder="NAME" className="bg-slate-50 p-4 rounded-xl font-bold flex-1 outline-none" value={newSite.name} onChange={e => setNewSite({ ...newSite, name: e.target.value })} />
                        <button onClick={() => { onUpdate([...sites, newSite]); setNewSite({ code: '', name: '' }); }} className="btn-fancy px-8 rounded-xl font-black">ADD SITE</button>
                    </div>
                    <div className="glass-card rounded-[32px] overflow-hidden">
                        <table className="w-full text-left">
                            <tbody>
                                {sites.map((s, i) => (
                                    <tr key={i} className="border-b border-slate-50 hover:bg-slate-50/50">
                                        <td className="p-6 font-black text-slate-400">S{s.code}</td>
                                        <td className="p-6 font-black text-slate-900 text-lg">{s.name}</td>
                                        <td className="p-6 text-right"><button onClick={() => onUpdate(sites.filter((_, idx) => idx !== i))} className="text-rose-400"><i data-lucide="trash-2" className="w-5 h-5"></i></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />); setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>

</html>
