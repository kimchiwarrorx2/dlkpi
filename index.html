                                ))}
                            </div>
                            <div className="px-4 py-1.5 rounded-full bg-slate-200/50 text-slate-500 font-extrabold text-[10px] tracking-widest uppercase">2026.03.12 FINAL</div>
                        </div>

                        <div className="animate-in fade-in slide-in-from-bottom-2 duration-500">
                            {activeTab === 'kpi' && <KpiManager tree={data.tree} onUpdate={(tree) => setData({ ...data, tree })} />}
                            {activeTab === 'workUnits' && <WorkUnitManager units={data.workUnits} onUpdate={(units) => setData({ ...data, workUnits: units })} />}
                            {activeTab === 'sites' && <SiteManager sites={data.sites} onUpdate={(sites) => setData({ ...data, sites })} />}
                        </div>
                    </main>
                </div>
            );
        }

        function KpiManager({ tree, onUpdate }) {
            const handleAddProject = (i1, i2, i3) => {
                const name = prompt('세부 프로젝트 명칭 입력:');
                if (!name) return;
                const newTree = JSON.parse(JSON.stringify(tree));
                if (!newTree[i1].children[i2].children[i3].projects) newTree[i1].children[i2].children[i3].projects = [];
                newTree[i1].children[i2].children[i3].projects.push(name);
                onUpdate(newTree);
            };

            return (
                <div className="space-y-16 pb-32">
                    {tree.map((l1, i1) => (
                        <div key={l1.code} className="lv1-container relative" style={{ '--primary': `var(--lv1-${l1.code})` }}>
                            <div className="flex items-center gap-4 mb-8 pl-6">
                                <span className="bg-slate-900 text-white px-4 py-1 rounded-lg font-black text-xs uppercase">KPI {l1.code}</span>
                                <h2 className="text-3xl font-black text-slate-900 tracking-tight">{l1.label}</h2>
                            </div>
                            <div className="space-y-10 pl-6">
                                {l1.children.map((l2, i2) => (
                                    <div key={l2.code} className="lv2-group rounded-[32px] p-8">
                                        <div className="flex items-center gap-5 mb-8">
                                            <div className="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xl">{l2.code}</div>
                                            <h3 className="text-xl font-black text-slate-800 tracking-tight">{l2.label}</h3>
                                        </div>
                                        <div className="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-4 gap-6">
                                            {l2.children.map((l3, i3) => (
                                                <div key={l3.code} className="flex flex-col gap-3">
                                                    <div className="lv3-item p-6 rounded-[24px] shadow-sm relative group border-2 border-slate-100 hover:border-slate-800 transition-all">
                                                        <div className="flex justify-between items-start mb-3">
                                                            <span className="text-[10px] font-black text-slate-200 uppercase">CODE {l2.code}{l3.code}</span>
                                                            <button onClick={() => handleAddProject(i1, i2, i3)} className="opacity-0 group-hover:opacity-100 w-6 h-6 rounded-lg bg-slate-900 text-white flex items-center justify-center"><i data-lucide="plus" className="w-4 h-4"></i></button>
                                                        </div>
                                                        <div className="lv3-label-text">{l3.label}</div>
                                                        <div className="lv3-full-text line-clamp-2">{l3.full}</div>
                                                        <div className="lv3-code-overlay" style={{ background: `var(--lv1-${l1.code})` }}>{l1.code}{l2.code}{l3.code}</div>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2 px-2">
                                                        {(l3.projects || []).map((p, pIdx) => (
                                                            <div key={pIdx} className="project-chip"><span>{p}</span></div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function WorkUnitManager({ units, onUpdate }) {
            const handleUpdateItem = (idx, field, value) => {
                const newUnits = [...units];
                newUnits[idx][field] = value;
                onUpdate(newUnits);
            };
            return (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                    {units.map((item, idx) => (
                        <div key={idx} className="glass-card group hover:border-slate-900 rounded-[32px] p-8 flex flex-col items-center text-center bg-white relative">
                            <div className="w-16 h-16 rounded-[24px] bg-slate-900 text-white flex items-center justify-center shadow-xl mb-6 font-black text-2xl">{item.code}</div>
                            <input
                                className="w-full text-center text-2xl font-black text-slate-900 mb-2 bg-transparent focus:bg-slate-50 border-none outline-none rounded-lg"
                                value={item.label} onChange={(e) => handleUpdateItem(idx, 'label', e.target.value)}
                            />
                            <textarea
                                className="w-full text-center text-xs text-slate-500 font-bold bg-transparent focus:bg-slate-50 border-none outline-none rounded-lg resize-none h-12"
                                value={item.definition} onChange={(e) => handleUpdateItem(idx, 'definition', e.target.value)}
                            />
                        </div>
                    ))}
                </div>
            );
        }

        function SiteManager({ sites, onUpdate }) {
            const [newSite, setNewSite] = useState({ code: '', name: '' });
            return (
                <div className="space-y-8">
                    <div className="glass-card rounded-[32px] p-8 border-2 border-slate-100 flex gap-4">
                        <input placeholder="CODE" className="bg-slate-50 p-4 rounded-xl font-bold border-2 border-slate-100 flex-1 outline-none" value={newSite.code} onChange={e => setNewSite({ ...newSite, code: e.target.value })} />
                        <input placeholder="NAME" className="bg-slate-50 p-4 rounded-xl font-bold border-2 border-slate-100 flex-1 outline-none" value={newSite.name} onChange={e => setNewSite({ ...newSite, name: e.target.value })} />
                        <button onClick={() => { onUpdate([...sites, newSite]); setNewSite({ code: '', name: '' }); }} className="btn-fancy px-8 rounded-xl font-black">ADD</button>
                    </div>
                    <div className="glass-card rounded-[32px] overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 border-b border-slate-100">
                                <tr><th className="p-6 font-black text-slate-400 text-xs">CODE</th><th className="p-6 font-black text-slate-400 text-xs">SITE NAME</th></tr>
                            </thead>
                            <tbody className="divide-y divide-slate-50">
                                {sites.map((s, i) => (
                                    <tr key={i}><td className="p-6 font-black text-slate-400">S{s.code}</td><td className="p-6 font-black text-slate-900 text-lg">{s.name}</td></tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>

</html>
